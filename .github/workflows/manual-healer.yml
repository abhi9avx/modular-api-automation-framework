name: Manual Self-Healing Trigger

on:
  workflow_dispatch:
    inputs:
      test_filter:
        description: 'Format: com.package.ClassName or ClassName.testMethod (No --tests flag needed)'
        required: false
        default: ''
      use_docker:
        description: 'Run tests in Docker container?'
        type: boolean
        default: false
      create_pr:
        description: 'Create a Pull Request if fixed?'
        type: boolean
        default: true

jobs:
  heal:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Python Dependencies
        run: |
          python -m venv healer/.venv
          ./healer/.venv/bin/pip install -r healer/requirements.txt

      - name: Configure Git
        run: |
          git config --global user.name "Self-Healing Agent"
          git config --global user.email "agent@self-healing.ai"

      - name: Run Manual Healer
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          # Verify Secrets
          if [ -z "${GEMINI_API_KEY}" ]; then echo "❌ GEMINI_API_KEY is MISSING in environment"; else echo "✅ GEMINI_API_KEY is present"; fi
          if [ -z "${GITHUB_TOKEN}" ]; then echo "❌ GITHUB_TOKEN is MISSING in environment"; else echo "✅ GITHUB_TOKEN is present"; fi
          if [ -z "${TELEGRAM_BOT_TOKEN}" ]; then echo "❌ TELEGRAM_BOT_TOKEN is MISSING in environment"; else echo "✅ TELEGRAM_BOT_TOKEN is present"; fi
          
          # Create .env file in root and healer/
          echo "GEMINI_API_KEY=${GEMINI_API_KEY}" > .env
          echo "GITHUB_TOKEN=${GITHUB_TOKEN}" >> .env
          echo "TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}" >> .env
          echo "TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}" >> .env
          cp .env healer/.env
          
          # Construct command
          CMD="./run_healer.sh"
          FILTER="${{ github.event.inputs.test_filter }}"
          if [ "$FILTER" != "" ]; then
            if [[ "$FILTER" == --* ]]; then
               CMD="$CMD $FILTER"
            else
               CMD="$CMD --test-filter $FILTER"
            fi
          fi
          if [ "${{ github.event.inputs.use_docker }}" == "true" ]; then
            CMD="$CMD --use-docker"
          fi
          if [ "${{ github.event.inputs.create_pr }}" == "true" ]; then
            CMD="$CMD --create-pr"
          fi
          
          chmod +x run_healer.sh
          echo "Executing: $CMD"
          eval $CMD

      - name: Send Telegram Notification
        if: always()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d parse_mode=Markdown \
            -d text="*Manual Self-Healing Finished!* %0A*Status*: ${{ job.status }} %0A*Run Details*: [View Run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"
